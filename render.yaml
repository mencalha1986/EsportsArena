services:
  - type: web
    name: esports-arena-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Supabase__Url
        sync: false
      - key: Cors__AllowedOrigins
        sync: false
