<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon — gradient ring -->
  <polygon points="24,1 43.5,12 43.5,36 24,47 4.5,36 4.5,12" fill="url(#g)"/>

  <!-- Inner dark fill -->
  <polygon points="24,5 40,14.5 40,33.5 24,43 8,33.5 8,14.5" fill="#080810"/>

  <!-- Subtle inner glow tint -->
  <polygon points="24,5 40,14.5 40,33.5 24,43 8,33.5 8,14.5" fill="url(#gInner)"/>

  <!-- Top-edge shimmer (depth effect) -->
  <polygon points="24,5 40,14.5 37.5,15.8 24,7.2 10.5,15.8 8,14.5" fill="rgba(255,255,255,0.07)"/>

  <!-- Lightning bolt — glow layer -->
  <path d="M 29.5 8.5 L 16.5 26 H 23.5 L 15 40.5 L 32.5 23 H 25.5 Z"
        fill="url(#g)" filter="url(#glowStrong)" opacity="0.6"/>

  <!-- Lightning bolt — main -->
  <path d="M 29.5 8.5 L 16.5 26 H 23.5 L 15 40.5 L 32.5 23 H 25.5 Z"
        fill="url(#g)" filter="url(#glow)"/>
</svg>
